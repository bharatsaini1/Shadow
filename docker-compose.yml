
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: mentriq
      MYSQL_USER: mentriq
      MYSQL_PASSWORD: mentriq
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mentriq-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - mentriq-net

  ai-service:
    build: ./ai-service
    env_file: ./ai-service/.env
    environment:
      - AI_SERVICE_API_KEY=${AI_SERVICE_API_KEY:-mentriq-ai-service-key-2024}
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - "8001:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mentriq-net
    depends_on:
      redis:
        condition: service_started

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - AI_SERVICE_API_KEY=mentriq-ai-service-key-2024
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000,http://localhost:8080
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - mentriq-net

  frontend:
    build: ./frontend
    ports:
      - "8080:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mentriq-net

volumes:
  mysqldata:

networks:
  mentriq-net:
    driver: bridge
